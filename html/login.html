<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 유효성 검사</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        .check-item {
            font-size: 14px;
        }

        .pass {
            color: green;
        }

        .fail {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container mt-5" style="max-width: 400px;">
        <h4 class="mb-4">🔐 회원가입</h4>

        <form>
            <div class="mb-3">
                <label for="email" class="form-label">이메일</label>
                <input type="text" class="form-control" id="email" placeholder="이메일을 입력하세요">
            </div>

            <div class="mb-1">
                <label for="pw" class="form-label">비밀번호</label>
                <input type="password" class="form-control" id="pw" placeholder="비밀번호를 입력하세요">
            </div>

            <ul class="list-unstyled mt-2 mb-3">
                <li class="check-item" id="check-upper">❌ 대문자 1개 이상</li>
                <li class="check-item" id="check-lower">❌ 소문자 1개 이상</li>
                <li class="check-item" id="check-number">❌ 숫자 1개 이상</li>
                <li class="check-item" id="check-special">❌ 특수문자 1개 이상 (!@#$%^&*)</li>
                <li class="check-item" id="check-length">❌ 8자리 이상</li>
            </ul>

            <div class="mb-3">
                <label for="pw2" class="form-label">비밀번호 확인</label>
                <input type="password" class="form-control" id="pw2" placeholder="비밀번호를 다시 입력하세요">
                <div id="pw-match-msg" class="form-text"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100">제출</button>
        </form>
    </div>
    <script>
        $('form').on('submit', function (e) {
            var 입력한값 = document.getElementById('email').value;
            var 비번 = document.getElementById('pw').value;

            if (!/\S+@\S+\.\S+/.test(입력한값)) {
                alert('이메일이 형식이 아님')
                e.preventDefault();
            }
            else if (!/[A-Z]/.test(비번)) {
                alert('대문자 없음')
                e.preventDefault();
            }
            else if (!/[a-z]/.test(비번)) {
                alert('소문자 없음')
                e.preventDefault();
            }
            else if (!/[0-9]/.test(비번)) {
                alert('숫자 없음')
                e.preventDefault();
            }
            else if (!/[!@#$%^&*]/.test(비번)) {
                alert('특수 문자 없음')
                e.preventDefault();
            }
            else if ($('#pw').val().length < 8) {
                alert('비밀번호는 8자 이상 입력해주세요')
                e.preventDefault();
            }
            else if ($('#pw2').val() != $('#pw').val()) {
                alert('비밀번호가 일치하지 않습니다')
                e.preventDefault();
            }
        })
        $('#pw').on('input', function () {
            var 비번 = document.getElementById('pw').value;
            $('.check-item').removeClass('pass');
            $('.check-item').removeClass('fail');

            if (/[A-Z]/.test(비번)) {
                $('#check-upper').html('✅ 대문자 1개 이상');
                $('#check-upper').addClass('pass');
            }
            else {
                $('#check-upper').html('❌ 대문자 1개 이상');
                $('#check-upper').addClass('fail');
            }
            if (/[a-z]/.test(비번)) {
                $('#check-lower').html('✅ 소문자 1개 이상');
                $('#check-lower').addClass('pass');
            }
            else {
                $('#check-lower').html('❌ 소문자 1개 이상');
                $('#check-lower').addClass('fail');
            }
            if (/[0-9]/.test(비번)) {
                $('#check-number').html('✅ 숫자 1개 이상')
                $('#check-number').addClass('pass');
            }
            else {
                $('#check-number').html('❌ 숫자 1개 이상');
                $('#check-number').addClass('fail');
            }
            if (/[!@#$%^&*]/.test(비번)) {
                $('#check-special').html('✅ 특수문자 1개 이상');
                $('#check-special').addClass('pass');
            }
            else {
                $('#check-special').html('❌ 특수문자 1개 이상');
                $('#check-special').addClass('fail');
            }
            if ($('#pw').val().length > 8) {
                $('#check-length').html('✅ 8자리');
                $('#check-length').addClass('pass');
            }
            else {
                $('#check-length').html('❌ 8자리');
                $('#check-length').addClass('fail');
            }
        })
        $('#pw2').on('input', function(){
            $(".form-text").removeClass("pass");
            $(".form-text").removeClass("fail");
            if($('#pw').val() == $('#pw2').val()){
                $('.form-text').html('✅ 비밀번호가 일치합니다.');
                $('.form-text').addClass('pass');
            }
            else{
                $('.form-text').html('❌ 비밀번호가 일치하지 않습니다.');
                $('.form-text').addClass('fail');
            }
        })
    </script>
</body>

</html>
