//index.html

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탭 UI 과제</title>
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>

  <div class="wrapper">

    <!-- ✅ 공지 배너 추가 -->
    <div class="banner">
      <span>📢 새로운 포트폴리오가 업데이트 되었습니다!</span>
      <button class="banner-close">✕</button>
    </div>

    <div class="top-bar">
      <h1>나의 프로필</h1>
      <button class="dark-btn">🌙 다크모드</button>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" id="btn1">소개</button>
      <button class="tab-btn" id="btn2">포트폴리오</button>
      <button class="tab-btn" id="btn3">연락처</button>
    </div>

    <div class="tab-content" id="tab1">
      <h2>👋 안녕하세요!</h2>
      <p>저는 웹 개발을 공부하고 있는 개발자입니다.<br>HTML, CSS, JavaScript를 열심히 배우는 중입니다.</p>
    </div>

    <div class="tab-content" id="tab2" style="display:none">
      <h2>💼 포트폴리오</h2>
      <p>아직 포트폴리오를 준비 중입니다.<br>곧 멋진 작품들로 채워나갈 예정입니다!</p>
    </div>

    <div class="tab-content" id="tab3" style="display:none">
      <h2>📬 연락처</h2>
      <p>이메일 : hello@example.com<br>궁금한 점이 있으시면 문의해주세요!</p>
      <button class="contact-btn">✉️ 문의하기</button>
    </div>

  </div>

  <!-- 모달 -->
  <div class="modal-bg">
    <div class="modal">
      <h3>📨 문의 완료!</h3>
      <p>문의가 접수되었습니다.<br>빠른 시일 내에 답변 드리겠습니다 😊</p>
      <button class="modal-close">닫기</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script>

    $('#btn1').on('click', function(){
        $('.tab-content').hide();
        $('.tab-btn').removeClass('active');
        $('#btn1').addClass('active');
        $('#tab1').fadeIn();
    });

    $('#btn2').on('click', function(){
        $('.tab-content').hide();
        $('.tab-btn').removeClass('active');
        $('#btn2').addClass('active');
        $('#tab2').fadeIn();
    });

    $('#btn3').on('click', function(){
        $('.tab-content').hide();
        $('.tab-btn').removeClass('active');
        $('#btn3').addClass('active');
        $('#tab3').fadeIn();
    });

    $('.dark-btn').on('click', function(){
        $('.wrapper').toggleClass('dark');
    });

    $('.contact-btn').on('click', function(){
        $('.modal-bg').css('display', 'block');
    });

    $('.modal-close').on('click', function(){
        $('.modal-bg').css('display', 'none');
    });

    $('.banner-close').on('click', function(){
        $('.banner').slideUp();
    })

  </script>
</body>
</html>
