<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
  <style>
    .wrapper {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      background: white;
    }
    h2 { text-align: center; margin-bottom: 24px; }
  </style>
</head>
<body>

  <div class="wrapper">
    <h2>회원가입</h2>
    <form action="success.html">
      <div class="my-3">
        <label>아이디</label>
        <input type="text" class="form-control" id="id-input" placeholder="아이디 입력">
      </div>
      <div class="my-3">
        <label>이메일</label>
        <input type="text" class="form-control" id="email-input" placeholder="이메일 입력">
      </div>
      <div class="my-3">
        <label>비밀번호</label>
        <input type="password" class="form-control" id="pw-input" placeholder="비밀번호 입력">
      </div>
      <div class="my-3">
        <label>비밀번호 확인</label>
        <input type="password" class="form-control" id="pw-check-input" placeholder="비밀번호 재입력">
      </div>
      <button type="submit" class="btn btn-primary w-100">가입하기</button>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script>
    $('form').on('submit', function(e){
        if($('#id-input').val() == ''){
            e.preventDefault();
            alert('아이디를 입력해주세요');
        }
        else if($('#id-input').val().length < 5){
            e.preventDefault();
            alert('아이디는 5자 이상 입력해주세요');
        }
        else if($('#email-input').val() == ''){
            e.preventDefault();
            alert('이메일을 입력해주세요')
        }
        else if($('#pw-input').val() == ''){
            e.preventDefault();
            alert('비밀번호를 입력해주세요')
        }
        else if($('#pw-input').val().length < 8){
            e.preventDefault();
            alert('비밀번호는 8자 이상 입력해주세요')
        }
        else if($('#pw-input').val() != $('#pw-check-input').val()){
            e.preventDefault();
            alert('비밀번호가 일치하지 않습니다')
        }
    });
  </script>
</body>
</html>
