<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연습문제</title>
    <style>
        * {
            margin: 0;
        }

        body {
            background: #ccc;
            padding: 20px;
        }

        #wrap {
            width: 520px;
            border: 1px solid black;
            padding: 20px 40px;
            margin: 20px, 40px;
            background: white;

        }

        fieldset {
            margin-bottom: 15px
        }

        ;

        legend {
            font-weight: bold
        }

        label {
            display: inline-block;
            width: 80;
        }

        ul {
            list-style: none;
        }

        li {
            height: 30px;
        }

        input[readonly] {
            border: none;
        }

        #output {
            width: 500px;
            height: 150px;
            padding: 10px;
            background-color: blanchedalmond;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 1px solid dodgerblue;
            margin: 10px auto;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <h1>프런트엔드, 개발자 지원소</h1>
        <p>HTML, CSS, javascrip 에 대한 기술적 이해와 경험이 있는 분을 찾습니다</p>
        <br>
        <hr><br>
        <form name="myForm">
            <fieldset>
                <legend>개인정보</legend>
                <ul>
                    <li>
                        <label for="userName">이름</label>
                        <input type="text" placeholder="공백 없이 입력하세요" name="userName" id="userName">
                    </li>

                    <li>
                        <laber for="contact">연락처</laber>
                        <input type="tel" id="contact" name="contact">
                    </li>

                    <li>
                        <label>경력선택</label>
                        <select name="expLevel" onchange="calcPay()">
                            <option value="0">신입</option>
                            <option value="1">1년이상</option>
                            <option value="2">3년이상</option>
                            <option value="3">5년이상</option>
                        </select>
                    </li>

                    <li>
                        <label for="expectedPay">예상연봉</label>
                        <input type="text" name="expectedPay" readonly>
                    </li>
                </ul>

            </fieldset>

            <fieldset>
                <legend>지원분야</legend>
                <ul>
                    <li>
                        <input type="radio" name="jobField" value="프론트엔드" checked>프론트엔드
                        <input type="radio" name="jobField" value="백엔드" checked>백엔드
                        <input type="radio" name="jobField" value="웹기획/디자인" checked>웹기획/디자인
                        <input type="radio" name="jobField" value="DevOps" checked>DevOps
                    </li>
                </ul>
            </fieldset>

            <div>
                <button type="button" onclick="submitForm()">접수하기</button>
                <button type="reset">취소</button>
            </div>

            <div id="output"></div>
        </form>
    </div>

</body>

</html>

<script>
    function calcPay() {
        if (myForm.expLevel.value === "0") myForm.expectedPay.value = "28,000,000원";
        else if (myForm.expLevel.value === "1") myForm.expectedPay.value = "30,000,000원";
        else if (myForm.expLevel.value === "2") myForm.expectedPay.value = "32,000,000원";
        else if (myForm.expLevel.value === "3") myForm.expectedPay.value = "35,000,000원";
    }

    function submitForm() {
        if (myForm.userName.value == "") {
            alert("이름을 입력해주세요");
            myForm.userName.focus();
            return;
        }
        if (myForm.contact.value == "") {
            alert("연락처를 입력해주세요");
            myForm.contact.focus();
            return;
        }
        let resultText = myForm.userName.value + "님은" + myForm.jobField.value + "분야에 지원하셨습니다.";
        document.getElementById("output").innerText = resultText;
        let id = setTimeout(() => { alert("부산소프트웨어마이스터고에 지원해주셔서 감사합니다.") }, 3000);
    }
</script>
