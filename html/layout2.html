<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Store</title>
    <link rel="stylesheet" href="../css/layout.css">
</head>

<body>
    <nav>
        <ul class="navbar">
            <li><a href="#">홈</a></li>
            <li><a href="#">신상품</a></li>
            <li><a href="#">베스트</a></li>
            <li><a href="#">세일</a></li>
            <li><a href="#">고객센터</a></li>
        </ul>
    </nav>
    <div class="main-background">
        <!-- position: relative 가 적용된 부모 박스 -->
        <!-- 안에 있는 absolute 자식들의 기준점 역할을 함 -->

        <h1 class="main-title">최고의 신발을 만나보세요</h1>
        <!-- 메인 타이틀 텍스트 -->

        <p class="main-desc">매 시즌 엄선된 최고의 신발을 소개합니다. 편안함과 스타일을 동시에 만족시키는 신발을 만나보세요.</p>
        <!-- 타이틀 아래 설명 텍스트 -->

        <a href="#" class="main-btn box">구매하기</a>
        <!-- 구매하기 버튼 -->
        <!-- a 태그지만 버튼처럼 스타일을 줄 것임 -->
        <!-- position: absolute 로 가운데 정렬 적용 -->


        <!-- ===== 겹치는 흰색 박스 ===== -->
        <div class="info-box">
            <!-- position: absolute + bottom: -80px 으로 -->
            <!-- 부모 박스(main-background) 아래로 삐져나와 겹치는 효과 -->
            <h2 style="text-align: center; font-size: 15px;">저희의 신발 디자인 철학</h2>
            <p style="font-size: 10px;">고객의 발을 가장 먼저 생각합니다. 최고급 소재와 장인의 손길로 만들어진 신발은 오래 신어도 편안하며 어떤 옷과도 잘 어울리는 세련된 디자인을
                자랑합니다.</p>
        </div>
    </div>

</body>

</html>
